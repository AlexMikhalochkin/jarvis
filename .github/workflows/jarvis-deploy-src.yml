# This workflow will deploy a Java project to the remote server
# It copies source code and build it on the remoter server to reduce time for deployment

name: Deploy source code

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2
      - name: Zip source code
        run: zip -r jarvis.zip gradle/ src/ gradlew build.gradle settings.gradle
      - name: Deploy the package to the remote server
        uses: garygrossgarten/github-action-scp@release
        with:
          local: jarvis.zip
          remote: jarvis/jarvis.zip
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
      - name: Run a script on remote server (start the application)
        if: always()
        uses: fifsky/ssh-action@master
        with:
          command: |
            unzip jarvis.zip -d extracted
            rm jarvis.zip
            cd extracted/
            ./gradlew bootJar
            cd ..
            mv extracted/build/libs/jarvis-*.jar jarvis.jar
            rm -r extracted
            kill $(ps aux | grep '/jarvis/jarvis.jar' | grep -v grep | awk '{print $2}')
            java -jar ~/jarvis/jarvis.jar &
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          user: ${{ secrets.SSH_USER }}
          pass: ${{ secrets.SSH_PASSWORD }}
          args: "-tt"